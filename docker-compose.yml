version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: agno-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agno_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agno_password}
      POSTGRES_DB: ${POSTGRES_DB:-agno_memory}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agno_user} -d ${POSTGRES_DB:-agno_memory}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agno-network

  # Agno Memory Bridge API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agno-api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-agno_user}:${POSTGRES_PASSWORD:-agno_password}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-agno_memory}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LLM_MODEL_ID: ${LLM_MODEL_ID:-claude-haiku-4-5-20251001}
      LEARNING_MODE: ${LEARNING_MODE:-always}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - agno-network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
    driver: local

networks:
  agno-network:
    driver: bridge
